<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice To Text</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .search-match { background: rgba(245, 158, 11, 0.3); border-radius: 3px; }
        .search-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .search-bar input { flex: 1; min-width: 180px; padding: 6px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 13px; }
        .search-bar input:focus { outline: none; border-color: var(--accent); }
        .search-match-count { font-size: 12px; color: var(--text-muted); }
        .lang-switcher { margin-left: auto; display: flex; align-items: center; gap: 4px; }
        .lang-switcher button { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .lang-switcher button.active { background: var(--accent); color: white; border-color: var(--accent); }
        .lang-switcher button:hover:not(.active) { border-color: var(--text-muted); }
    </style>
</head>
<body>

<div class="header">
    <img src="/static/icona.png" alt="Voice To Text" class="header-icon">
    <div>
        <h1>Voice To Text</h1>
        <p data-i18n="subtitle"></p>
    </div>
    <div class="lang-switcher">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Light/Dark">&#9790;</button>
        <span style="font-size:18px; margin-right:4px;">&#127760;</span>
        <button id="lang-cs" class="active" onclick="setLang('cs')">CZ</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>
</div>

<div class="container">
    <div class="upload-area" id="uploadArea">
        <div class="icon">&#128190;</div>
        <h3 data-i18n="upload_title"></h3>
        <p>MP3, MP4, WAV, M4A, OGG, FLAC, WEBM, MKV, AVI, MOV</p>
        <p style="margin-top:8px; color:#6366f1; font-weight:600;" data-i18n="upload_batch"></p>
        <input type="file" id="fileInput" multiple accept=".mp3,.mp4,.wav,.m4a,.ogg,.flac,.webm,.mkv,.avi,.mov">
    </div>

    <div class="settings-bar">
        <label data-i18n="model_label"></label>
        <select id="modelSelect" class="lang-select">
            <option value="small" data-i18n-opt="model_small"></option>
            <option value="medium" selected data-i18n-opt="model_medium"></option>
            <option value="large-v3" data-i18n-opt="model_large"></option>
        </select>
        <span style="color:var(--text-muted); font-size:12px;" id="modelHint"></span>
    </div>

    <div style="margin-bottom:20px;">
        <button class="btn btn-dark" onclick="toggleSettings()" data-i18n="settings_btn"></button>
        <div id="settingsPanel" class="settings-panel" style="display:none;">
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div style="flex:1; min-width:280px;">
                    <h4 style="margin:0 0 8px; color:var(--text-primary);" data-i18n="dict_title"></h4>
                    <p style="font-size:12px; color:var(--text-muted); margin-bottom:8px;" data-i18n="dict_desc"></p>
                    <textarea id="dictionaryEditor" rows="8"></textarea>
                </div>
                <div style="flex:1; min-width:280px;">
                    <h4 style="margin:0 0 8px; color:var(--text-primary);" data-i18n="names_title"></h4>
                    <p style="font-size:12px; color:var(--text-muted); margin-bottom:8px;" data-i18n="names_desc"></p>
                    <textarea id="namesEditor" rows="8"></textarea>
                </div>
            </div>
            <div style="margin-top:10px; display:flex; gap:8px;">
                <button class="btn btn-primary" onclick="saveSettings()" data-i18n="save_settings"></button>
                <span id="settingsSaved" style="color:var(--green); font-size:13px; display:none; align-self:center;" data-i18n="saved"></span>
            </div>
        </div>
    </div>

    <div style="margin-bottom:20px;">
        <button class="btn btn-dark" onclick="toggleProjects()" data-i18n="projects_btn"></button>
        <div id="projectsPanel" class="settings-panel" style="display:none;">
            <div id="projectsList" style="color:var(--text-secondary); font-size:13px;" data-i18n="loading"></div>
        </div>
    </div>

    <div class="jobs-list" id="jobsList"></div>
</div>

<footer style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px; border-top:1px solid var(--border); margin-top:40px;">
    Made by <a href="https://github.com/programmingveya-netizen" target="_blank" style="color:var(--accent-light); text-decoration:none; font-weight:600;">programmingveya-netizen</a>
</footer>

let currentLang = localStorage.getItem('vtt_lang') || 'cs';

function t(key, ...args) {
    const val = T[currentLang]?.[key] || T['cs'][key] || key;
    return typeof val === 'function' ? val(...args) : val;
}

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('vtt_lang', lang);
    document.getElementById('lang-cs').className = lang === 'cs' ? 'active' : '';
    document.getElementById('lang-en').className = lang === 'en' ? 'active' : '';
    applyI18n();
}

function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (T[currentLang]?.[key]) {
            const val = T[currentLang][key];
            el.textContent = typeof val === 'function' ? val() : val;
        }
    });
    document.querySelectorAll('[data-i18n-opt]').forEach(el => {
        const key = el.getAttribute('data-i18n-opt');
        if (T[currentLang]?.[key]) el.textContent = T[currentLang][key];
    });
    // Model hint
    const sel = document.getElementById('modelSelect');
    if (sel) {
        const hints = { small: t('model_hint_small'), medium: t('model_hint_medium'), 'large-v3': t('model_hint_large') };
        document.getElementById('modelHint').textContent = hints[sel.value] || '';
    }
}

// ── App logic ──────────────────────────────────────────
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const jobsList = document.getElementById('jobsList');
const jobData = {};

const transLangNames = {
    cs: 'Čeština', sk: 'Slovenština', en: 'English',
    de: 'Deutsch', pl: 'Polski', hu: 'Magyar', ro: 'Română'
};

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) uploadFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { if (fileInput.files.length > 0) uploadFiles(fileInput.files); });

async function uploadFiles(files) {
    const formData = new FormData();
    for (const file of files) formData.append('files', file);
    formData.append('model', document.getElementById('modelSelect').value);
    try {
        const resp = await fetch('/upload', { method: 'POST', body: formData });
        const data = await resp.json();
        for (const job of data.jobs) { createJobCard(job.id, job.filename); pollJobStatus(job.id); }
    } catch (err) { alert(t('upload_error') + ': ' + err.message); }
    fileInput.value = '';
}

function createJobCard(jobId, filename) {
    const card = document.createElement('div');
    card.className = 'job-card';
    card.id = `job-${jobId}`;
    card.innerHTML = `
        <div class="job-header" onclick="toggleJobBody('${jobId}')" style="cursor:pointer;">
            <div style="display:flex; align-items:center; gap:10px;">
                <span class="collapse-arrow" id="arrow-${jobId}">&#9660;</span>
                <span class="job-filename">${escapeHtml(filename)}</span>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <span class="job-status queued" id="status-${jobId}">${t('queued')}</span>
                <button class="btn-delete" onclick="event.stopPropagation(); deleteJob('${jobId}')" title="X">X</button>
            </div>
        </div>
        <div id="body-${jobId}" class="job-body">
            <div class="progress-bar"><div class="progress-fill" id="progress-${jobId}" style="width: 0%"></div></div>
            <div id="progress-text-${jobId}" style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">${t('waiting')}</div>
            <div id="results-${jobId}" class="results-area" style="display:none;"></div>
        </div>
    `;
    jobsList.prepend(card);
}

function toggleJobBody(jobId) {
    const body = document.getElementById(`body-${jobId}`);
    const arrow = document.getElementById(`arrow-${jobId}`);
    if (body.classList.contains('collapsed')) {
        body.classList.remove('collapsed');
        arrow.textContent = '\u25BC';
    } else {
        body.classList.add('collapsed');
        arrow.textContent = '\u25B6';
    }
}

function pollJobStatus(jobId) {
    const interval = setInterval(async () => {
        try {
            const resp = await fetch(`/status/${jobId}`);
            const data = await resp.json();
            const statusEl = document.getElementById(`status-${jobId}`);
            const progressEl = document.getElementById(`progress-${jobId}`);
            const progressText = document.getElementById(`progress-text-${jobId}`);
            progressEl.style.width = data.progress + '%';
            if (data.status === 'processing') {
                statusEl.className = 'job-status processing'; statusEl.textContent = t('processing');
                progressText.textContent = `${t('transcribing')} ${data.progress}%`;
            } else if (data.status === 'done') {
                statusEl.className = 'job-status done'; statusEl.textContent = t('done');
                progressText.textContent = t('done_segments', data.segment_count);
                clearInterval(interval); showResults(jobId);
            } else if (data.status === 'error') {
                statusEl.className = 'job-status error'; statusEl.textContent = t('error');
                progressText.textContent = `${t('error')}: ${data.error}`; clearInterval(interval);
            }
        } catch (err) { /* retry */ }
    }, 1500);
}

    resultsDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h4 style="margin:0; color:var(--text-primary);">${t('transcript_title')} <span style="font-weight:400; font-size:12px; color:var(--text-muted);">${t('click_to_edit')}</span></h4>
            <div style="display:flex; gap:8px; align-items:center;">
                <button class="btn btn-success" onclick="saveEdits('${jobId}')" id="save-btn-${jobId}" style="display:none;">${t('save_changes')}</button>
                <button class="btn btn-primary" onclick="saveProject('${jobId}')">${t('save_project')}</button>
            </div>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input-${jobId}" placeholder="${t('search_placeholder')}" onkeydown="if(event.key==='Enter') searchInTranscript('${jobId}')">
            <button class="btn btn-dark" onclick="searchInTranscript('${jobId}')">${t('search_btn')}</button>
            <button class="btn btn-orange" onclick="markSearchAsClaim('${jobId}')">${t('mark_red')}</button>
            <span class="search-match-count" id="search-count-${jobId}"></span>
        </div>
        <div class="transcript-box" id="transcript-${jobId}"></div>
        <div class="stats-bar" id="stats-${jobId}"></div>
        <div id="claims-summary-${jobId}" style="margin:10px 0;"></div>
        <div class="actions">
            <button class="btn btn-primary" onclick="exportFile('${jobId}', 'txt')">${t('export_txt')}</button>
            <button class="btn btn-success" onclick="exportFile('${jobId}', 'pdf')">${t('export_pdf')}</button>
            <button class="btn btn-orange" onclick="exportFile('${jobId}', 'srt')">${t('export_srt')}</button>
            <button class="btn btn-purple" onclick="exportZip('${jobId}')">${t('export_zip')}</button>
        </div>
        <div class="translate-bar">
            <span style="font-weight:600; font-size:13px; margin-right:10px;">${t('translate_to')}</span>
            <label class="lang-check"><input type="checkbox" value="sk" data-job="${jobId}"> SK</label>
            <label class="lang-check"><input type="checkbox" value="en" data-job="${jobId}"> EN</label>
            <label class="lang-check"><input type="checkbox" value="de" data-job="${jobId}"> DE</label>
            <label class="lang-check"><input type="checkbox" value="pl" data-job="${jobId}"> PL</label>
            <label class="lang-check"><input type="checkbox" value="hu" data-job="${jobId}"> HU</label>
            <label class="lang-check"><input type="checkbox" value="ro" data-job="${jobId}"> RO</label>
            <button class="btn btn-purple" onclick="translateJobMulti('${jobId}')" style="margin-left:10px;">${t('translate_btn')}</button>
            <span id="translate-status-${jobId}" style="font-size:12px; color:var(--text-muted); margin-left:8px;"></span>
        </div>
        <div id="translations-${jobId}"></div>
    `;
    renderSegments(jobId);
    resultsDiv.style.display = 'block';
}

function highlightClaims(text, claims) {
    let result = escapeHtml(text);
    const textLower = text.toLowerCase();
    let highlights = [];
    for (const claim of claims) {
        const claimLower = claim.text.toLowerCase();
        let searchFrom = 0;
        while (true) {
            const idx = textLower.indexOf(claimLower, searchFrom);
            if (idx === -1) break;
            highlights.push({ start: idx, end: idx + claim.text.length, reason: claim.reason });
            searchFrom = idx + 1;
        }
    }
    if (highlights.length === 0) return { html: result, count: 0 };
    highlights.sort((a, b) => b.start - a.start);
    let filtered = [];
    for (const h of highlights) { if (!filtered.some(f => h.start < f.end && h.end > f.start)) filtered.push(h); }
    filtered.sort((a, b) => b.start - a.start);
    let parts = [];
    let lastEnd = text.length;
    for (const h of filtered) {
        if (h.end < lastEnd) parts.unshift({ text: text.substring(h.end, lastEnd), highlight: false });
        parts.unshift({ text: text.substring(h.start, h.end), highlight: true, reason: h.reason });
        lastEnd = h.start;
    }
    if (lastEnd > 0) parts.unshift({ text: text.substring(0, lastEnd), highlight: false });
    result = parts.map(p => {
        const escaped = escapeHtml(p.text);
        return p.highlight ? `<mark class="health-mark" title="${escapeHtml(p.reason)}">${escaped}</mark>` : escaped;
    }).join('');
    return { html: result, count: filtered.length };
}

function renderSegments(jobId) {
    const container = document.getElementById(`transcript-${jobId}`);
    const { segments, health_claims } = jobData[jobId];
    container.innerHTML = '';
    for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        const ts = formatTimestamp(seg.start) + ' - ' + formatTimestamp(seg.end);
        const { html: highlightedHtml } = highlightClaims(seg.text, health_claims);
        const searchQuery = jobData[jobId].searchQuery || '';
        const { html: finalHtml } = applySearchHighlight(highlightedHtml, searchQuery);
        const row = document.createElement('div');
        row.className = 'segment'; row.dataset.index = i;
        row.innerHTML = `<span class="timestamp">[${ts}]</span><span class="seg-text" contenteditable="true" data-job="${jobId}" data-idx="${i}">${finalHtml}</span>`;
        container.appendChild(row);
        row.querySelector('.seg-text').addEventListener('input', () => {
            document.getElementById(`save-btn-${jobId}`).style.display = 'inline-flex';
            row.querySelector('.seg-text').classList.add('edited');
        });
    }
    renderClaimsSummary(jobId);
    renderStats(jobId);
}

function renderStats(jobId) {
    const statsDiv = document.getElementById(`stats-${jobId}`);
    if (!statsDiv || !jobData[jobId]) return;
    const segments = jobData[jobId].segments;
    const fullText = segments.map(s => s.text).join(' ');
    const words = fullText.split(/\s+/).filter(w => w.length > 0).length;
    const chars = fullText.length;
    const duration = segments.length > 0 ? segments[segments.length - 1].end : 0;
    const durationStr = formatTimestamp(duration);
    const readingMin = Math.max(1, Math.round(words / 200));

    statsDiv.innerHTML = `
        <span>${words} ${t('stats_words')}</span>
        <span>${chars} ${t('stats_chars')}</span>
        <span>${t('stats_duration')}: ${durationStr}</span>
        <span>${t('stats_reading')}: ~${readingMin} ${t('minutes')}</span>
    `;
}

function renderClaimsSummary(jobId) {
    const summaryDiv = document.getElementById(`claims-summary-${jobId}`);
    const { health_claims } = jobData[jobId];
    if (health_claims.length === 0) { summaryDiv.innerHTML = ''; return; }
    let html = `<div class="claims-panel"><h4 style="margin:0 0 10px;">${t('marked_count', health_claims.length)}</h4>`;
    for (const claim of health_claims) {
        html += `<div class="claim-item"><span class="claim-reason">${escapeHtml(claim.reason)}</span>
            <p class="claim-text">"${escapeHtml(claim.text.substring(0, 150))}${claim.text.length > 150 ? '...' : ''}"</p></div>`;
    }
    summaryDiv.innerHTML = html + '</div>';
}

async function saveEdits(jobId) {
    const textSpans = document.querySelectorAll(`[data-job="${jobId}"].seg-text`);
    const segments = jobData[jobId].segments;
    for (const span of textSpans) segments[parseInt(span.dataset.idx)].text = span.textContent;
    try {
        const resp = await fetch(`/save/${jobId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ segments }) });
        const data = await resp.json();
        if (data.ok) {
            jobData[jobId].health_claims = data.health_claims;
            document.getElementById(`save-btn-${jobId}`).style.display = 'none';
            textSpans.forEach(s => s.classList.remove('edited'));
            renderSegments(jobId);
            showToast(t('saved'));
        }
    } catch (err) { alert(err.message); }
}

async function translateJobMulti(jobId) {
    const checkboxes = document.querySelectorAll(`input[data-job="${jobId}"]:checked`);
    const langs = Array.from(checkboxes).map(cb => cb.value);
    if (langs.length === 0) { alert(t('select_lang')); return; }
    const statusEl = document.getElementById(`translate-status-${jobId}`);
    const translationsDiv = document.getElementById(`translations-${jobId}`);
    translationsDiv.innerHTML = '';
    await syncSegmentsToServer(jobId);
    for (let i = 0; i < langs.length; i++) {
        const lang = langs[i];
        statusEl.textContent = t('translating', transLangNames[lang] || lang, i + 1, langs.length);
        const formData = new FormData(); formData.append('target_lang', lang);
        try {
            const resp = await fetch(`/translate/${jobId}`, { method: 'POST', body: formData });
            const data = await resp.json();
            if (!jobData[jobId].translations) jobData[jobId].translations = {};
            jobData[jobId].translations[lang] = data.segments;
            let html = `<div class="translation-block"><div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0 8px;">
                <h4 style="margin:0; color:var(--green);">${transLangNames[lang] || lang}</h4>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-dark" style="padding:4px 10px; font-size:11px;" onclick="exportTranslated('${jobId}','txt','${lang}')">TXT</button>
                    <button class="btn btn-dark" style="padding:4px 10px; font-size:11px;" onclick="exportTranslated('${jobId}','pdf','${lang}')">PDF</button>
                    <button class="btn btn-dark" style="padding:4px 10px; font-size:11px;" onclick="exportTranslated('${jobId}','srt','${lang}')">SRT</button>
                </div></div><div class="translation-box">`;
            for (const seg of data.segments) {
                const ts = formatTimestamp(seg.start) + ' - ' + formatTimestamp(seg.end);
                html += `<div class="segment"><span class="timestamp">[${ts}]</span>${escapeHtml(seg.text)}</div>`;
            }
            translationsDiv.innerHTML += html + '</div></div>';
        } catch (err) { translationsDiv.innerHTML += `<p style="color:var(--red);padding:10px;">${t('error')}: ${err.message}</p>`; }
    }
    statusEl.textContent = t('translated_done', langs.length);
    setTimeout(() => statusEl.textContent = '', 3000);
}

async function syncSegmentsToServer(jobId) {
    const textSpans = document.querySelectorAll(`[data-job="${jobId}"].seg-text`);
    if (textSpans.length === 0) return;
    const segments = jobData[jobId].segments;
    for (const span of textSpans) segments[parseInt(span.dataset.idx)].text = span.textContent;
    await fetch(`/save/${jobId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ segments }) });
}

async function deleteJob(jobId) {
    const card = document.getElementById(`job-${jobId}`);
    if (card) { card.style.opacity = '0.5'; await fetch(`/delete/${jobId}`, { method: 'POST' }); card.remove(); delete jobData[jobId]; }
}

function downloadFile(url, filename) {
    const a = document.createElement('a'); a.href = url; a.download = filename || '';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast(t('downloaded', filename || 'file'));
}

function showToast(message) {
    let toast = document.getElementById('toast');
    if (!toast) { toast = document.createElement('div'); toast.id = 'toast'; document.body.appendChild(toast); }
    toast.textContent = message; toast.className = 'toast show';
    setTimeout(() => toast.className = 'toast', 2500);
}

async function exportFile(jobId, format) { await syncSegmentsToServer(jobId); downloadFile(`/export/${jobId}?format=${format}&lang=original`, jobId + '.' + format); }
async function exportTranslated(jobId, format, lang) { downloadFile(`/export/${jobId}?format=${format}&lang=${lang}`, jobId + '_' + lang + '.' + format); }

function formatTimestamp(seconds) {
    const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = Math.floor(seconds % 60);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

// Settings
async function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        const [dictResp, namesResp] = await Promise.all([fetch('/dictionary'), fetch('/names')]);
        document.getElementById('dictionaryEditor').value = (await dictResp.json()).content;
        document.getElementById('namesEditor').value = (await namesResp.json()).content;
    } else panel.style.display = 'none';
}

async function saveSettings() {
    await Promise.all([
        fetch('/dictionary', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: document.getElementById('dictionaryEditor').value }) }),
        fetch('/names', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: document.getElementById('namesEditor').value }) })
    ]);
    const saved = document.getElementById('settingsSaved'); saved.style.display = 'inline';
    setTimeout(() => saved.style.display = 'none', 2000);
}

// Search
function searchInTranscript(jobId) {
    const query = document.getElementById(`search-input-${jobId}`).value.trim();
    const countEl = document.getElementById(`search-count-${jobId}`);
    if (!jobData[jobId]) return;
    jobData[jobId].searchQuery = query;
    if (!query) { jobData[jobId].searchQuery = ''; countEl.textContent = ''; renderSegments(jobId); return; }
    renderSegments(jobId);
    countEl.textContent = t('found', document.querySelectorAll(`#transcript-${jobId} .search-match`).length);
}

function applySearchHighlight(html, query) {
    if (!query) return { html, count: 0 };
    const queryLower = query.toLowerCase(); let count = 0;
    const parts = html.split(/(<[^>]+>)/);
    for (let i = 0; i < parts.length; i++) {
        if (parts[i].startsWith('<')) continue;
        const textLower = parts[i].toLowerCase(); let result = '', lastIdx = 0, idx;
        while ((idx = textLower.indexOf(queryLower, lastIdx)) !== -1) {
            result += parts[i].substring(lastIdx, idx);
            result += `<span class="search-match">${parts[i].substring(idx, idx + query.length)}</span>`;
            lastIdx = idx + query.length; count++;
        }
        result += parts[i].substring(lastIdx); parts[i] = result;
    }
    return { html: parts.join(''), count };
}

async function markSearchAsClaim(jobId) {
    const input = document.getElementById(`search-input-${jobId}`);
    const query = input ? input.value.trim() : '';
    if (!query) { alert(t('enter_search')); return; }
    await syncSegmentsToServer(jobId);
    try {
        const resp = await fetch(`/mark-claim/${jobId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: query, reason: 'manually marked' }) });
        if (!resp.ok) { alert(t('error')); return; }
        const data = await resp.json();
        jobData[jobId].health_claims = data.health_claims; jobData[jobId].searchQuery = '';
        input.value = ''; document.getElementById(`search-count-${jobId}`).textContent = '';
        renderSegments(jobId); showToast(t('marked_red', query));
    } catch (err) { alert(err.message); }
}

// ZIP
async function exportZip(jobId) {
    await syncSegmentsToServer(jobId);
    const langs = Object.keys(jobData[jobId]?.translations || {});
    let url = `/export-zip/${jobId}`; if (langs.length > 0) url += '?langs=' + langs.join(',');
    downloadFile(url, 'export.zip');
}

// Projects
async function toggleProjects() {
    const panel = document.getElementById('projectsPanel');
    if (panel.style.display === 'none') { panel.style.display = 'block'; await loadProjectsList(); }
    else panel.style.display = 'none';
}

async function loadProjectsList() {
    const listDiv = document.getElementById('projectsList');
    try {
        const resp = await fetch('/projects'); const data = await resp.json();
        const projects = data.projects || data || [];
        if (projects.length === 0) { listDiv.innerHTML = `<p style="color:var(--text-muted);">${t('no_projects')}</p>`; return; }
        let html = '';
        for (const proj of projects) {
            html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
                <div><span style="color:var(--text-primary); font-weight:500;">${escapeHtml(proj.name || proj.filename || proj.id)}</span>
                <span style="color:var(--text-muted); font-size:11px; margin-left:8px;">${proj.date || proj.saved_date || ''}</span></div>
                <button class="btn btn-primary" style="padding:4px 12px; font-size:12px;" onclick="loadProject('${escapeHtml(proj.path || proj.id)}')">${t('load_btn')}</button>
            </div>`;
        }
        listDiv.innerHTML = html;
    } catch (err) { listDiv.innerHTML = `<p style="color:var(--red);">${t('error')}</p>`; }
}

async function loadProject(projectPath) {
    try {
        const resp = await fetch('/project/load', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: projectPath }) });
        const data = await resp.json();
        if (data.job_id) {
            createJobCard(data.job_id, data.filename || t('project_loaded'));
            const s = document.getElementById(`status-${data.job_id}`); if (s) { s.className = 'job-status done'; s.textContent = t('done'); }
            const p = document.getElementById(`progress-${data.job_id}`); if (p) p.style.width = '100%';
            const pt = document.getElementById(`progress-text-${data.job_id}`); if (pt) pt.textContent = t('loaded_from_project');
            showResults(data.job_id); showToast(t('project_loaded'));
        }
    } catch (err) { alert(err.message); }
}

async function saveProject(jobId) {
    await syncSegmentsToServer(jobId);
    try {
        const resp = await fetch(`/project/save/${jobId}`, { method: 'POST' });
        const data = await resp.json();
        showToast(data.ok ? t('project_saved') : (data.error || t('error')));
    } catch (err) { alert(err.message); }
}

// Model hint
document.getElementById('modelSelect').addEventListener('change', function() {
    const hints = { small: t('model_hint_small'), medium: t('model_hint_medium'), 'large-v3': t('model_hint_large') };
    document.getElementById('modelHint').textContent = hints[this.value] || '';
});

// Theme toggle
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('vtt_theme', next);
    document.getElementById('themeBtn').textContent = next === 'dark' ? '\u263E' : '\u2600';
}

// Init theme
const savedTheme = localStorage.getItem('vtt_theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '\u263E' : '\u2600';

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    // Ctrl+S - save edits
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        const saveBtn = document.querySelector('[id^="save-btn-"]:not([style*="display: none"])');
        if (saveBtn) saveBtn.click();
    }
    // Ctrl+F - focus search (if results visible)
    if (e.ctrlKey && e.key === 'f') {
        const searchInput = document.querySelector('.search-bar input');
        if (searchInput) { e.preventDefault(); searchInput.focus(); }
    }
    // Ctrl+E - export TXT (first visible job)
    if (e.ctrlKey && e.key === 'e') {
        e.preventDefault();
        const firstJob = Object.keys(jobData)[0];
        if (firstJob) exportFile(firstJob, 'txt');
    }
    // Escape - clear search
    if (e.key === 'Escape') {
        const searchInput = document.querySelector('.search-bar input:focus');
        if (searchInput) {
            searchInput.value = '';
            const jobId = searchInput.id.replace('search-input-', '');
            if (jobData[jobId]) { jobData[jobId].searchQuery = ''; renderSegments(jobId); }
            document.getElementById(`search-count-${jobId}`).textContent = '';
        }
    }
});

// Init language on load
applyI18n();
</script>
